<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi 2026 | Special Wish For You</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #000;
            overflow: hidden;
            position: relative;
        }

        /* Video: Optimized for Mobile & Desktop */
        .back-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Ensures video fills screen without stretching */
            filter: brightness(0.6);
        }

        .main-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        /* Glassmorphism Card */
        .wish-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 35px 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: float 4s ease-in-out infinite;
        }

        .holi-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 4.5rem;
            line-height: 1;
            margin: 15px 0;
            background: linear-gradient(to right, #ff0000, #fff200, #1eff00, #00f2ff, #7000ff, #ff00c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: hue-rotate 3s linear infinite;
        }

        /* Improved Input Section */
        .input-group-custom {
            background: #fff;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .input-group-custom input {
            border: none;
            background: transparent;
            padding: 10px 15px;
            flex: 1;
            outline: none;
            font-weight: 600;
            color: #333;
            font-size: 1rem;
            width: 100%;
        }

        .btn-create {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border-radius: 50px;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .btn-create:active { transform: scale(0.9); }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            border-radius: 50px;
            padding: 14px;
            font-weight: bold;
            display: none; 
            margin-top: 15px;
            text-decoration: none !important;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes hue-rotate {
            from { filter: hue-rotate(0deg); }
            to { filter: hue-rotate(360deg); }
        }

        @media (max-width: 480px) {
            .holi-title { font-size: 3.5rem; }
            .wish-card { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="back-video">
        <source src="Happy Holi 2024 By CWS.mp4" type="video/mp4">
    </video>

    <div class="main-wrapper">
        <div class="wish-card">
            <p class="sender-name" style="color: #fff; margin-bottom: 5px;">
                <span id="displayName" style="color: #00ffcc; font-weight: 800; font-size: 1.8rem; text-transform: uppercase; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">App Vriksh</span> 
                <br> <span style="font-size: 0.9rem; opacity: 0.9;">is wishing you</span>
            </p>

            <h1 class="holi-title">HAPPY <br> HOLI</h1>

            <p class="message" style="color: #fff; font-size: 1rem; line-height: 1.4; text-shadow: 1px 1px 3px #000;">
                "May your life be filled with the vibrant colors of joy, success, and love."
            </p>

            <div class="user-action">
                <div class="input-group-custom">
                    <input type="text" id="nameBox" placeholder="Type your name...">
                    <button class="btn-create" onclick="createWish()">Create</button>
                </div>
                
                <a href="#" id="waBtn" class="btn-whatsapp btn-block">
                   🚀 Share on WhatsApp
                </a>
            </div>
            
            <p style="color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 20px; letter-spacing: 1px;">© 2026 | APP VRIKSH</p>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        window.onload = function() {
            var nameFromUrl = getUrlParameter('n');
            if (nameFromUrl !== "") {
                document.getElementById('displayName').innerText = nameFromUrl;
            }
        };

        function createWish() {
            var inputName = document.getElementById('nameBox').value;
            if (inputName.trim() === "") {
                alert("Enter your name first! 😊");
                return;
            }

            document.getElementById('displayName').innerText = inputName;
            
            var currentUrl = window.location.href.split('?')[0];
            var shareLink = currentUrl + "?n=" + encodeURIComponent(inputName);
            
            var waMessage = "🎨 *" + inputName + "* sent you a colorful surprise! %0A Click below to see magic 👇 %0A%0A " + shareLink;
            
            var waBtn = document.getElementById('waBtn');
            waBtn.href = "whatsapp://send?text=" + waMessage; // Better for mobile app triggers
            waBtn.style.display = "block";
            
            // Handle fallback for desktop WhatsApp
            if(!/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
                waBtn.href = "https://web.whatsapp.com/send?text=" + waMessage;
            }
        }
    </script>
</body>
</html>
