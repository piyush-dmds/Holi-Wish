<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi 2026 - Wish Your Friends!</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <video autoplay loop muted playsinline class="back-video">
        <source src="Happy Holi 2024 By CWS.mp4" type="video/mp4">
    </video>

    <div class="main-container text-center">
        
        <div class="greeting-card p-4">
            <p class="from-text">From: <span id="senderName" class="hue">Mausam Raj</span></p>
            
            <h1 class="main-title">HAPPY <br> <span class="holi-text">HOLI</span></h1>
            
            <div class="message-box">
                <p>May your life be as colorful as the rainbow!</p>
            </div>

            <div class="share-section mt-4">
                <input type="text" id="nameInput" class="form-control mb-2" placeholder="Enter Your Name">
                <button onclick="updateName()" class="btn btn-warning btn-block font-weight-bold">Create My Wish</button>
                
                <a id="whatsappBtn" href="#" class="btn btn-success btn-block mt-2 d-none">
                    👉 Share on WhatsApp
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateName() {
            const name = document.getElementById('nameInput').value;
            if(name.trim() !== "") {
                document.getElementById('senderName').innerText = name;
                
                // Create WhatsApp Link
                const url = window.location.href.split('?')[0]; // Get current URL
                const encodedName = encodeURIComponent(name);
                const shareLink = `https://api.whatsapp.com/send?text=🎨 *${name}* has sent you a magical Holi surprise! Click here to see: ${url}?name=${encodedName}`;
                
                const btn = document.getElementById('whatsappBtn');
                btn.href = shareLink;
                btn.classList.remove('d-none');
            }
        }

        // Auto-load name from URL for viral effect
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            if (name) {
                document.getElementById('senderName').innerText = decodeURIComponent(name);
            }
        }
    </script>
</body>
</html>
