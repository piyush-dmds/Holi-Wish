<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi 2026 | Special Wish For You</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #000;
            overflow: hidden;
            position: relative;
        }

        /* Video: Centered and Scaled for all screens */
        .back-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.6);
            /* Fallback for low power mode */
            background: #000; 
        }

        .main-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .wish-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 35px 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: float 4s ease-in-out infinite;
        }

        .holi-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 4.5rem;
            line-height: 1;
            margin: 15px 0;
            background: linear-gradient(to right, #ff0000, #fff200, #1eff00, #00f2ff, #7000ff, #ff00c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: hue-rotate 3s linear infinite;
        }

        .input-group-custom {
            background: #fff;
            border-radius: 50px;
            padding: 5px;
            display: flex;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .input-group-custom input {
            border: none;
            background: transparent;
            padding: 10px 15px;
            flex: 1;
            outline: none;
            font-weight: 600;
            color: #333;
            font-size: 1rem;
        }

        .btn-create {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border-radius: 50px;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            border-radius: 50px;
            padding: 14px;
            font-weight: bold;
            display: none; 
            margin-top: 15px;
            text-decoration: none !important;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes hue-rotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        @media (max-width: 480px) {
            .holi-title { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline poster="fallback-image.jpg" class="back-video">
        <source src="Happy Holi 2024 By CWS.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="main-wrapper">
        <div class="wish-card">
            <p class="sender-name" style="color: #fff;">
                <span id="displayName" style="color: #00ffcc; font-weight: 800; font-size: 1.8rem; text-transform: uppercase;">App Vriksh</span> 
                <br> <span style="font-size: 0.9rem;">is wishing you</span>
            </p>

            <h1 class="holi-title">HAPPY <br> HOLI</h1>

            <p class="message" style="color: #fff; text-shadow: 1px 1px 3px #000;">
                "May your life be filled with the vibrant colors of joy!"
            </p>

            <div class="user-action">
                <div class="input-group-custom">
                    <input type="text" id="nameBox" placeholder="Type name...">
                    <button class="btn-create" onclick="createWish()">Create</button>
                </div>
                <a href="#" id="waBtn" class="btn-whatsapp btn-block">🚀 Share on WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        // Logic to update name from URL
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('n');
            if (name) document.getElementById('displayName').innerText = name;
            
            // Mobile Autoplay Force
            document.querySelector('video').play().catch(e => console.log("Autoplay blocked, waiting for interaction"));
        };

        function createWish() {
            var inputName = document.getElementById('nameBox').value;
            if (!inputName.trim()) return alert("Enter name!");

            document.getElementById('displayName').innerText = inputName;
            var shareLink = window.location.origin + window.location.pathname + "?n=" + encodeURIComponent(inputName);
            var waMessage = "🎨 *" + inputName + "* sent you a Holi surprise! %0A Click here 👇 %0A " + shareLink;
            
            var waBtn = document.getElementById('waBtn');
            waBtn.href = (navigator.userAgent.match(/Android|iPhone/i) ? "whatsapp://send?text=" : "https://web.whatsapp.com/send?text=") + waMessage;
            waBtn.style.display = "block";
        }
    </script>
</body>
</html>
